<div class="modal fade" id="addBranchManagerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form method="post" action="{% url 'hr:branch_manager_add' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title branch-modal-title">Add Branch Manager</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    {% if standalone_manager_form.non_field_errors %}
                    <ul class="auth-error-list mb-3">
                        {% for error in standalone_manager_form.non_field_errors %}<li>{{ error }}</li>{% endfor %}
                    </ul>
                    {% endif %}
                    {% include "hr/includes/branch_manager_fields.html" with mgr_form=standalone_manager_form %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="topbar-quick-add"><i class="bi bi-person-check-fill"></i> Save Manager</button>
                </div>
            </form>
        </div>
    </div>
</div>
