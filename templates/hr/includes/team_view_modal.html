<div class="modal fade" id="{{ modal_id }}" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title branch-modal-title">{{ title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <dl class="row g-2 mb-0 small team-view-dl">
                    <dt class="col-sm-4 text-muted">Name</dt>
                    <dd class="col-sm-8 fw-semibold" data-view-field="displayName">—</dd>
                    <dt class="col-sm-4 text-muted">Username</dt>
                    <dd class="col-sm-8" data-view-field="username">—</dd>
                    <dt class="col-sm-4 text-muted">Email</dt>
                    <dd class="col-sm-8" data-view-field="email">—</dd>
                    {% if show_branch != False %}
                    <dt class="col-sm-4 text-muted">Branch</dt>
                    <dd class="col-sm-8" data-view-field="branch">—</dd>
                    {% endif %}
                    <dt class="col-sm-4 text-muted">Mobile</dt>
                    <dd class="col-sm-8" data-view-field="phone">—</dd>
                    <dt class="col-sm-4 text-muted">Join date</dt>
                    <dd class="col-sm-8" data-view-field="joinDate">—</dd>
                    <dt class="col-sm-4 text-muted date-of-birth-row">Date of birth</dt>
                    <dd class="col-sm-8 date-of-birth-row" data-view-field="dateOfBirth">—</dd>
                    {% if show_salary %}
                    <dt class="col-sm-4 text-muted salary-row">Basic salary</dt>
                    <dd class="col-sm-8 salary-row" data-view-field="basicSalary">—</dd>
                    <dt class="col-sm-4 text-muted salary-row">Other salary</dt>
                    <dd class="col-sm-8 salary-row" data-view-field="otherSalary">—</dd>
                    <dt class="col-sm-4 text-muted salary-row">Total salary</dt>
                    <dd class="col-sm-8 salary-row fw-semibold" data-view-field="totalSalary">—</dd>
                    {% endif %}
                    <dt class="col-sm-4 text-muted">Status</dt>
                    <dd class="col-sm-8" data-view-field="status">—</dd>
                </dl>
                <div class="team-view-documents mt-4 pt-3 border-top">
                    <h6 class="fw-semibold mb-3"><i class="bi bi-folder2-open me-1"></i> Onboarding documents</h6>
                    <div data-view-documents-list class="team-view-documents-list">
                        <p class="text-muted small mb-0">No documents uploaded.</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                <button type="button" class="topbar-quick-add team-view-to-edit-btn" data-bs-dismiss="modal">
                    <i class="bi bi-pencil-fill"></i> Edit profile
                </button>
            </div>
        </div>
    </div>
</div>
