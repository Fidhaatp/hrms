{% if avatar_url %}
<img src="{{ avatar_url }}" alt="{{ display_name }}" class="profile-avatar profile-avatar--{{ size }} {{ extra_class }}"{% if size == 'xl' %} id="profileAvatarImg"{% endif %} />
{% else %}
<div class="profile-avatar profile-avatar--initials profile-avatar--{{ size }} {{ extra_class }}"{% if size == 'xl' %} id="profileAvatarImg"{% endif %} aria-hidden="true">{{ initials }}</div>
{% endif %}
