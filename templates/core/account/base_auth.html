{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block auth_title %}Account{% endblock %} — TAKHLEES HRMS</title>
    {% include "core/includes/google_fonts.html" %}
    <link href="{% static 'hr/css/takhlees-theme.css' %}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="{% static 'core/css/auth.css' %}" rel="stylesheet" />
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-page">
    <div class="auth-layout">
        {% block auth_content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
