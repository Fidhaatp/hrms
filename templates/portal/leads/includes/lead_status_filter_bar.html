<form method="get" class="section-card lead-list-filters lead-monitor-filters mb-3 py-3 px-3">
    <div class="row g-2 align-items-end">
        <div class="col-lg-3 col-md-6">
            <label class="form-label branch-form-label small mb-1" for="leadFilterSearch">Search</label>
            <div class="input-group input-group-sm">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="search" name="q" id="leadFilterSearch" class="form-control border-start-0"
                    placeholder="Name, phone, ID…" value="{{ lead_filters.q }}" />
            </div>
        </div>
        {% if show_staff_status_filter %}
        <div class="col-lg-2 col-md-4">
            <label class="form-label branch-form-label small mb-1" for="leadFilterStaffStatus">Staff status</label>
            <select name="staff_status" id="leadFilterStaffStatus" class="form-select form-select-sm">
                <option value="all" {% if lead_filters.staff_status == 'all' %}selected{% endif %}>All staff status</option>
                {% for status in filter_staff_statuses %}
                <option value="{{ status.pk }}" {% if lead_filters.staff_status == status.pk|stringformat:'s' %}selected{% endif %}>{{ status.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        {% if show_followup_status_filter %}
        <div class="col-lg-2 col-md-4">
            <label class="form-label branch-form-label small mb-1" for="leadFilterFollowupStatus">Follow-up status</label>
            <select name="followup_status" id="leadFilterFollowupStatus" class="form-select form-select-sm">
                <option value="all" {% if lead_filters.followup_status == 'all' %}selected{% endif %}>All follow-up</option>
                <option value="none" {% if lead_filters.followup_status == 'none' %}selected{% endif %}>Not set yet</option>
                {% for status in filter_followup_statuses %}
                <option value="{{ status.pk }}" {% if lead_filters.followup_status == status.pk|stringformat:'s' %}selected{% endif %}>{{ status.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        {% if show_backoffice_status_filter %}
        <div class="col-lg-2 col-md-4">
            <label class="form-label branch-form-label small mb-1" for="leadFilterBackofficeStatus">Back office</label>
            <select name="backoffice_status" id="leadFilterBackofficeStatus" class="form-select form-select-sm">
                <option value="all" {% if lead_filters.backoffice_status == 'all' %}selected{% endif %}>All back office</option>
                {% for value, label in filter_backoffice_statuses %}
                <option value="{{ value }}" {% if lead_filters.backoffice_status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="col-lg-auto col-md-6 d-flex gap-2 flex-wrap">
            <button type="submit" class="topbar-quick-add text-decoration-none border-0">
                <i class="bi bi-funnel-fill"></i> Apply
            </button>
            <a href="?" class="btn btn-sm btn-light">Clear</a>
        </div>
    </div>
</form>
