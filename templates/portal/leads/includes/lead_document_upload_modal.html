<div class="modal fade" id="followupDocUploadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" id="followupDocUploadForm" action="#" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title branch-modal-title">Upload document</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-muted mb-3">Customer: <strong id="fuUploadLeadName">—</strong></p>
                    <div class="mb-3">
                        <label class="form-label branch-form-label">Document type *</label>
                        <select name="doc_type" class="form-control" required>
                            {% for value, label in document_types %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label branch-form-label">File *</label>
                        <input type="file" name="file" class="form-control" accept=".pdf,.jpg,.jpeg,.png,.webp" required />
                        <div class="form-text small">PDF or image (JPG, PNG).</div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label branch-form-label">Label (optional)</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Degree certificate" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="topbar-quick-add"><i class="bi bi-cloud-upload-fill"></i> Upload</button>
                </div>
            </form>
        </div>
    </div>
</div>
