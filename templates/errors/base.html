{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ error_code }} — {{ error_title }} | TAKHLEES HRMS</title>
    {% include "core/includes/google_fonts.html" %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #e01e26;
            --primary-dark: #b8181f;
            --primary-light: #fde8e9;
            --accent: #00843d;
            --accent-error: #e01e26;
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 10px 40px rgba(0, 0, 0, .08);
            --radius: 14px;
            --error-accent: {% block error_accent %}#e01e26{% endblock %};
            --error-accent-light: {% block error_accent_light %}#fde8e9{% endblock %};
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .error-wrap {
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        .error-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 48px 40px 40px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 17px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, .35);
        }

        .brand-name {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            letter-spacing: -0.02em;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: -.2px;
        }

        .error-code {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            letter-spacing: -0.02em;
            font-size: clamp(72px, 18vw, 96px);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--error-accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .error-icon-wrap {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: var(--error-accent-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--error-accent);
        }

        .error-title {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            letter-spacing: -0.02em;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: .95rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn-primary-custom {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: .9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background .2s, transform .15s;
        }

        .btn-primary-custom:hover {
            background: var(--primary-dark);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            font-size: .9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: border-color .2s, color .2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .error-footer {
            margin-top: 24px;
            font-size: .8rem;
            color: var(--text-muted);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="error-wrap">
        <div class="error-card">
            <a href="/" class="brand">
                <img src="{% static 'hr/images/takhlees-logo.png' %}" alt="TAKHLEES" width="48" height="48" style="border-radius:8px" />
                <span class="brand-name">TAKHLEES HRMS</span>
            </a>

            <div class="error-icon-wrap">
                <i class="bi {% block error_icon %}bi-exclamation-circle{% endblock %}"></i>
            </div>

            <div class="error-code">{{ error_code }}</div>
            <h1 class="error-title">{{ error_title }}</h1>
            <p class="error-message">{{ error_message }}</p>

            <div class="error-actions">
                <a href="/" class="btn-primary-custom">
                    <i class="bi bi-house-fill"></i> Go to Home
                </a>
                <a href="javascript:history.back()" class="btn-outline-custom">
                    <i class="bi bi-arrow-left"></i> Go Back
                </a>
            </div>
        </div>
        <p class="error-footer">HRMS &middot; Enterprise CRM + Human Resources</p>
    </div>
</body>
</html>
