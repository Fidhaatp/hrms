<VirtualHost *:80>
        ServerName hrms.natdemy.com
        ServerAlias www.hrms.natdemy.com
        Redirect permanent / https://hrms.natdemy.com/ 

        RewriteEngine on
        RewriteCond %{SERVER_NAME} =hrms.natdemy.com [OR]
        RewriteCond %{SERVER_NAME} =www.hrms.natdemy.com
        RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin admin@hrms.natdemy.com
        ServerName hrms.natdemy.com
        ServerAlias www.hrms.natdemy.com
        
        DocumentRoot /home/srv/hrms
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        Alias /static /home/srv/hrms/hrms/static
        <Directory /home/srv/hrms/hrms/static>
                Require all granted
        </Directory>

        Alias /media /home/srv/hrms/hrms/media
        <Directory /home/srv/hrms/hrms/media>
                Require all granted
        </Directory>

        <Directory /home/srv/hrms/hrms/hrms>
            <Files wsgi.py>
                    Require all granted
            </Files>
        </Directory>

        WSGIDaemonProcess    hrms python-path=/home/srv/hrms/hrms python-home=/home/srv/hrms/venv
        WSGIProcessGroup hrms
        WSGIScriptAlias / /home/srv/hrms/hrms/hrms/wsgi.py


</VirtualHost>